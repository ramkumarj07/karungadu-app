<!DOCTYPE html>
<html>
<head>
  <title>Steps</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="login-box">
  <h2>🚶 Steps</h2>

  <input type="number" id="steps" placeholder="Enter steps">

  <button onclick="calc()">Calculate</button>

  <h3 id="result"></h3>

  <button onclick="goBack()">⬅ Back</button>
</div>

<script>
function calc() {
  let s = document.getElementById("steps").value;
  let km = s * 0.0008;
  let cal = s * 0.04;

  document.getElementById("result").innerText =
    "Distance: " + km.toFixed(2) + " km | Calories: " + cal.toFixed(0);
}

function goBack() {
  window.location.href = "dashboard.html";
}
</script>

</body>
</html>
