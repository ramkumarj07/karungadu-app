<!DOCTYPE html>
<html>
<head>
    <title>Workers</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            font-family: Arial;
            padding: 20px;
            background: #f5f5f5;
        }

        h2 {
            text-align: center;
        }

        .box {
            background: white;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 10px;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 5px 0;
        }

        button {
            padding: 10px;
            width: 100%;
            margin-top: 10px;
            background: green;
            color: white;
            border: none;
            border-radius: 8px;
        }

        .delete {
            background: red;
            width: auto;
            padding: 5px 10px;
            float: right;
        }
    </style>
</head>
<body>

<h2>👨‍🌾 Workers</h2>

<div class="box">
    <input type="text" id="name" placeholder="Worker Name">
    <input type="number" id="salary" placeholder="Salary">
    <input type="date" id="date">

    <!-- 🔥 BUTTON WITHOUT onclick -->
    <button id="addBtn">Add Worker</button>
</div>

<div id="list"></div>

<button onclick="goBack()">⬅ Back</button>

<script>

let workers = JSON.parse(localStorage.getItem("workers")) || [];

// ✅ ADD WORKER FUNCTION
function addWorker() {
    let name = document.getElementById("name").value;
    let salary = document.getElementById("salary").value;
    let date = document.getElementById("date").value;

    if (name === "" || salary === "" || date === "") {
        alert("Fill all fields");
        return;
    }

    workers.push({ name, salary, date });
    localStorage.setItem("workers", JSON.stringify(workers));

    display();

    // clear inputs
    document.getElementById("name").value = "";
    document.getElementById("salary").value = "";
    document.getElementById("date").value = "";
}

// ✅ DISPLAY FUNCTION
function display() {
    let list = document.getElementById("list");
    list.innerHTML = "";

    workers.forEach((w, i) => {
        list.innerHTML += `
            <div class="box">
                <b>${w.name}</b> - ₹${w.salary} - ${w.date}
                <button class="delete" onclick="deleteWorker(${i})">X</button>
            </div>
        `;
    });
}

// ✅ DELETE
function deleteWorker(i) {
    workers.splice(i, 1);
    localStorage.setItem("workers", JSON.stringify(workers));
    display();
}

// ✅ BACK
function goBack() {
    window.location.href = "dashboard.html";
}

// 🔥 IMPORTANT FIX (EVENT LISTENER)
document.getElementById("addBtn").addEventListener("click", addWorker);

// LOAD DATA
display();

</script>

</body>
</html>
