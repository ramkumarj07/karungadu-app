<!DOCTYPE html>
<html>
<head>
    <title>Workers</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            font-family: Arial;
            padding: 20px;
            background: #f5f5f5;
        }

        h2 { text-align: center; }

        .box {
            background: white;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 10px;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 5px 0;
        }

        button {
            padding: 12px;
            width: 100%;
            margin-top: 10px;
            background: green;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
        }

        .delete {
            background: red;
            width: auto;
            padding: 5px 10px;
            float: right;
            font-size: 12px;
        }
    </style>
</head>
<body>

<h2>👨‍🌾 Workers Management</h2>

<div class="box">
    <input type="text" id="name" placeholder="Worker Name">
    <input type="number" id="salary" placeholder="Salary">
    <input type="date" id="date">

    <button id="addBtn">Add Worker</button>
</div>

<div id="list"></div>

<button id="backBtn">⬅ Back</button>

<script type="module">

// 🔥 IMPORT
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, push, onValue, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

// 🔥 CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyDmgXoFjV02ovknKLS95_Tnf1M9ycCfazk",
  authDomain: "senthilapp-45706.firebaseapp.com",
  databaseURL: "https://senthilapp-45706-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "senthilapp-45706",
  storageBucket: "senthilapp-45706.firebasestorage.app",
  messagingSenderId: "345379579967",
  appId: "1:345379579967:web:01021c180652a6d6aab08a",
  measurementId: "G-RT5XCT5RLC"
};

// 🔥 INIT
const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const workersRef = ref(db, "workers");

// 🔥 ADD
function addWorker() {
    let name = document.getElementById("name").value;
    let salary = document.getElementById("salary").value;
    let date = document.getElementById("date").value;

    if (!name || !salary || !date) {
        alert("Fill all fields");
        return;
    }

    push(workersRef, { name, salary, date });

    document.getElementById("name").value = "";
    document.getElementById("salary").value = "";
    document.getElementById("date").value = "";
}

// 🔥 DISPLAY
onValue(workersRef, (snapshot) => {
    let list = document.getElementById("list");
    list.innerHTML = "";

    snapshot.forEach((child) => {
        let data = child.val();
        let key = child.key;

        list.innerHTML += `
            <div class="box">
                <b>${data.name}</b> - ₹${data.salary} - ${data.date}
                <button class="delete" onclick="deleteWorker('${key}')">X</button>
            </div>
        `;
    });
});

// 🔥 DELETE
window.deleteWorker = function(key) {
    remove(ref(db, "workers/" + key));
}

// 🔥 FINAL FIX (LOAD AFTER DOM READY)
window.onload = function() {

    document.getElementById("addBtn").addEventListener("click", addWorker);

    document.getElementById("backBtn").addEventListener("click", function() {
        window.location.href = "dashboard.html";
    });

};

</script>

</body>
</html>
